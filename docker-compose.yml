version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fraudlens-db
    environment:
      POSTGRES_DB: fraudlens
      POSTGRES_USER: fraudlens
      POSTGRES_PASSWORD: fraudlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudlens -d fraudlens"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
