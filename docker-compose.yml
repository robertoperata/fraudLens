services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fraudlens-db
    environment:
      POSTGRES_DB: fraudlens
      POSTGRES_USER: fraudlens
      POSTGRES_PASSWORD: fraudlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudlens -d fraudlens"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fraudlens-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"          # also exposed for Swagger UI at http://localhost:8080/swagger-ui.html
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fraudlens
      SPRING_DATASOURCE_USERNAME: fraudlens
      SPRING_DATASOURCE_PASSWORD: fraudlens
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-min-32chars}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-not-configured}
      # CORS origin matches the nginx frontend container (browser calls same-origin
      # via the nginx proxy, so this only matters for direct backend access)
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-admin123}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ── React frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: fraudlens-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"            # app is available at http://localhost:3000

volumes:
  postgres_data:
